<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carlos Chica | Contacto</title>
    <link rel="preload" href="css/Normalize.css" as="style" />
    <link rel="stylesheet" href="css/Normalize.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="css/estilos.css" as="style" />
    <link href="css/estilos.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav class="barra-navegacion">
        <div class="nav-container">
          <a href="index.html" class="logo">🫩 Carlos Chica</a>
          <button class="menu-toggle" onclick="toggleMenu()">☰</button>
          <ul class="enlaces-nav" id="menu-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="portafolio.html">Portafolio &amp; PC</a></li>
            <li><a href="contacto.html" class="activo">Contacto</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="contenedor">
      <section>
        <div class="seccion-titulo">
          <h2>Formulario de Contacto</h2>
          <p>Todos los campos son obligatorios</p>
        </div>

        <div class="form-contenedor">
          <form class="formulario">
            <fieldset>
              <legend>Envíame un mensaje</legend>

              <div class="campo">
                <label for="nombre">Nombre Completo:</label>
                <input
                  type="text"
                  id="nombre"
                  class="input-text"
                  placeholder="Ingrese su nombre"
                />
              </div>

              <div class="campo">
                <label for="email">Correo Electrónico:</label>
                <input
                  type="email"
                  id="email"
                  class="input-text"
                  placeholder="ejemplo@correo.com"
                />
              </div>

              <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea
                  id="mensaje"
                  class="input-text"
                  rows="5"
                  placeholder="Escriba su mensaje..."
                ></textarea>
              </div>

              <div class="enviar">
                <input
                  class="btn-enviar"
                  type="submit"
                  value="Enviar Mensaje"
                />
              </div>
            </fieldset>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <div class="contenedor">
        <p>© 2026 Carlos Ricardo Chica Solórzano - Universidad de Guayaquil</p>
        <p
          style="
            font-size: 1.3rem;
            margin-top: 10px;
            color: var(--texto-secundario);
          "
        >
          Asignatura: Desarrollo de Aplicaciones Web | Proyecto del Primer
          Parcial
        </p>
      </div>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
